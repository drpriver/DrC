name: CI
on:
  push:
  pull_request:
  schedule:
    - cron: '0 3 * * *'
jobs:
  linux-x64:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cc: [gcc, clang]
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get install -y libffi-dev
      - run: ${{ matrix.cc }} build.c -o build && ./build -b Bin
      - run: ./build test -- --multithreaded --force-colors

  linux-arm:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        cc: [gcc, clang]
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get install -y libffi-dev
      - run: ${{ matrix.cc }} build.c -o build && ./build -b Bin
      - run: ./build test -- --multithreaded --force-colors
  windows-x64:
    if: github.event_name != 'schedule'
    runs-on: windows-latest
    strategy:
      matrix:
        cc: [cl, clang, clang-cl]
    defaults:
      run:
        shell: cmd
    steps:
      - uses: actions/checkout@v6
      - run: call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat" && cl /std:c11 /Zc:preprocessor build.c /Fe:build.exe && build.exe -b Bin BCC=${{ matrix.cc }} HCC=${{ matrix.cc }} && build.exe test -- --multithreaded --force-colors
  macos:
    if: github.event_name != 'schedule'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - run: cc build.c -o build && ./build -b Bin
      - run: ./build test -- --multithreaded --force-colors
  fuzz:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get install -y libffi-dev
      - name: Restore fuzz corpus
        uses: actions/cache@v5
        with:
          path: Bin/fuzz_corpus
          key: fuzz-corpus-${{ github.sha }}
          restore-keys: fuzz-corpus-
      - run: clang build.c -o build && ./build -b Bin
      - run: ./build run_cc_fuzz -- -max_total_time=1800
        continue-on-error: true
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: fuzz-crashes
          path: |
            crash-*
            leak-*
            timeout-*
          if-no-files-found: ignore
